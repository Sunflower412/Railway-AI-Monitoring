spring:
  application:
    name: railway-ai-monitoring

  datasource:
    url: jdbc:postgresql://localhost:5432/railway_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 9898

logging:
  level:
    com.railway.ai: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

file:
  upload-dir: ./uploads
  image-dir: ./uploads/images
  video-dir: ./uploads/videos
  max-image-size: 10485760  # 10MB
  max-video-size: 104857600 # 100MB

model:
  directory: ./models
  name: yolov8.onnx