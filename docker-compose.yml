version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgis/postgis:15-3.4
    container_name: railway-postgres
    environment:
      POSTGRES_DB: railway_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - railway-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Keycloak для аутентификации
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.5
    container_name: railway-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - railway-network
    command: start-dev

  # pgAdmin для удобного просмотра БД (опционально)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: railway-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@railway.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - railway-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

networks:
  railway-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data: